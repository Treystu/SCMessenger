<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>LogSankey Elite v4.0 Fuzzy</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
    <style>
      :root {
        --bg: #020617;
        --primary: #00ced1;
        --accent: #a855f7;
        --text: #f1f5f9;
        --glass: rgba(15, 23, 42, 0.98);
        --glass-border: rgba(255, 255, 255, 0.1);
        --header-h: 70px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      header {
        height: var(--header-h);
        padding: 0 30px;
        background: var(--glass);
        backdrop-filter: blur(40px);
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 1000;
        flex-shrink: 0;
      }
      #main-layout {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 480px;
        width: 100%;
        min-height: 0;
      }
      #viz-container {
        position: relative;
        background: rgba(0, 0, 0, 0.5);
        height: 100%;
        width: 100%;
        overflow: auto;
      }
      #sidebar {
        background: var(--glass);
        backdrop-filter: blur(30px);
        border-left: 1px solid var(--glass-border);
        display: flex;
        flex-direction: column;
        padding: 24px;
        height: 100%;
        overflow: hidden;
      }
      #sankey-svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      #tooltip {
        position: fixed;
        padding: 8px 16px;
        background: var(--primary);
        border-radius: 6px;
        color: #000;
        font-size: 13px;
        font-weight: 1000;
        pointer-events: none;
        opacity: 0;
        z-index: 2000;
        box-shadow: 0 5px 25px rgba(0, 206, 209, 0.5);
        text-transform: uppercase;
      }

      .node rect {
        fill-opacity: 1 !important;
        rx: 4;
        cursor: pointer;
        transition: all 0.25s;
        filter: saturate(1.8);
      }
      .node:hover rect {
        filter: brightness(1.5) saturate(2);
        transform: scaleX(1.15);
      }
      .node.selected rect {
        stroke: #fff;
        stroke-width: 4px;
        filter: brightness(1.8) saturate(2);
      }
      .link {
        fill: none;
        cursor: pointer;
        transition: stroke-opacity 0.25s;
        stroke-opacity: 0.18;
      }
      .link:hover {
        stroke-opacity: 0.95 !important;
      }
      .node text {
        font-size: 8px;
        fill: rgba(255, 255, 255, 0.7);
        pointer-events: none;
        text-shadow: 0 1px 3px #000;
        font-weight: 950;
      }
      #log-feed {
        flex: 1;
        overflow-y: auto;
        padding-right: 12px;
      }
      .log-item {
        padding: 8px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.02);
        margin-bottom: 8px;
        font-size: 9px;
        line-height: 1.5;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .btn {
        padding: 10px 20px;
        border-radius: 12px;
        font-weight: 800;
        font-size: 11px;
        border: none;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn-stop {
        background: #ef4444;
        color: white;
      }
      .btn-resume {
        background: #10b981;
        color: white;
      }
      .btn-reset {
        background: rgba(255, 255, 255, 0.1);
        color: #94a3b8;
        margin-left: 10px;
      }
      .slider-group {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(255, 255, 255, 0.05);
        padding: 5px 12px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .slider-group label {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .slider-group span {
        font-size: 0.75rem;
        min-width: 25px;
        color: var(--accent);
        font-family: 'JetBrains Mono', monospace;
      }
      input[type="range"] {
        width: 80px;
        height: 4px;
        border-radius: 2px;
        appearance: none;
        background: rgba(255, 255, 255, 0.1);
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 12px;
        height: 12px;
        background: var(--accent);
        border-radius: 50%;
        box-shadow: 0 0 10px var(--accent);
      }
      .header-controls {
        display: flex;
        align-items: center;
        gap: 20px;
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .logo {
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        border-radius: 12px;
        display: grid;
        place-items: center;
        font-weight: 950;
        color: #000;
        font-size: 18px;
      }
      .title-group h1 {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 900;
      }
      .title-group .version {
        font-weight: 200;
        opacity: 0.6;
      }
      .search-box {
        position: relative;
        display: flex;
        align-items: center;
      }
      .search-box .search-icon {
        position: absolute;
        left: 12px;
        color: var(--text-dim);
        font-size: 0.8rem;
      }
      .search-box input {
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid var(--glass-border);
        color: white;
        padding: 10px 12px 10px 35px; /* Adjusted padding for icon */
        border-radius: 12px;
        width: 200px;
        outline: none;
        font-size: 0.85rem;
      }
      .primary-btn {
        background: var(--primary);
        color: #000;
        padding: 8px 16px;
        border-radius: 8px;
        font-weight: 700;
        font-size: 0.85rem;
        border: none;
        cursor: pointer;
        transition: background 0.2s;
      }
      .primary-btn:hover {
        background: #00b3b6;
      }
      .secondary-btn {
        background: rgba(255, 255, 255, 0.1);
        color: var(--text-dim);
        padding: 8px 16px;
        border-radius: 8px;
        font-weight: 700;
        font-size: 0.85rem;
        border: none;
        cursor: pointer;
        transition: background 0.2s;
      }
      .secondary-btn:hover {
        background: rgba(255, 255, 255, 0.15);
      }
    </style>
  </head>
  <body>
    <div id="tooltip"></div>
    <header>
      <div class="header-left">
        <div class="logo">LS</div>
        <div class="title-group">
          <h1>LogSankey</h1>
          <span class="version">v10.0 High-Precision Sankey</span>
        </div>
      </div>
      <div class="header-controls">
        <div class="slider-group">
          <label>Density</label>
          <input type="range" id="densitySlider" min="0" max="10" step="0.5" value="0">
          <span id="densityVal">0.0</span>
        </div>
        <div class="slider-group">
          <label>Vertical</label>
          <input type="range" id="depthSlider" min="1" max="10" step="0.5" value="3.2">
          <span id="depthVal">3.2</span>
        </div>
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Search logs..." />
        </div>
        <button id="pauseBtn" class="secondary-btn">Pause</button>
        <button id="clearBtn" class="secondary-btn">Clear</button>
        <button id="resetBtn" class="primary-btn">Reset Graph</button>
      </div>
    </header>

    <div id="main-layout">
      <div id="viz-container">
        <svg id="sankey-svg"></svg>
      </div>
      <div id="sidebar">
        <div
          style="
            font-size: 11px;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 15px;
            font-weight: 900;
            display: flex;
            justify-content: space-between;
          "
        >
          <span>Variant Feed</span
          ><span id="focus-label" style="color: var(--primary)">ALL LOGS</span>
        </div>
        <div id="log-feed"></div>
      </div>
    </div>

    <script>
      const svg = d3.select("#sankey-svg"),
        container = document.getElementById("viz-container"),
        logFeed = document.getElementById("log-feed"),
        tooltip = document.getElementById("tooltip");
      let nodeRegistry = new Map(),
        linkRegistry = new Map(),
        logsBuffer = [],
        isPaused = false,
        currentFocus = null;
      const sankeyInstance = d3
        .sankey()
        .nodeWidth(3)
        .nodePadding(4)
        .nodeAlign(d3.sankeyJustify);
      const colors = {
        Error: "#f87171",
        Warning: "#fbbf24",
        Info: "#4ade80",
        Debug: "#22d3ee",
        Android: "#3de1ad",
        iOS: "#3b82f6",
        GCP: "#facc15",
        Sim: "#f472b6",
        OSX: "#94a3b8",
        Harness: "#fb923c",
        System: "#a855f7",
      };

      function getColor(id) {
        for (let k in colors) if (id.includes(k)) return colors[k];
        return d3.interpolateWarm((id.length % 20) / 20);
      }

      function render() {
        const rect = container.getBoundingClientRect();
        if (rect.width < 100 || rect.height < 100) return;

        const search = document.getElementById("searchInput").value.toLowerCase();
        const densityThreshold = +d3.select("#densitySlider").property("value");
        const verticalScale = +d3.select("#depthSlider").property("value");
        
        d3.select("#densityVal").text(densityThreshold.toFixed(1));
        d3.select("#depthVal").text(verticalScale.toFixed(1));

        // 1. Base Set: All valid links
        let activeLinks = Array.from(linkRegistry.values()).filter(l => l.value > 0);

        // 2. Search/Focus Filter
        if (currentFocus) {
          if (currentFocus.type === "node")
            activeLinks = activeLinks.filter(
              (l) => l.source.includes(currentFocus.id) || l.target.includes(currentFocus.id)
            );
          else
            activeLinks = activeLinks.filter(
              (l) => l.source === currentFocus.src && l.target === currentFocus.tgt
            );
        } else if (search) {
          activeLinks = activeLinks.filter(
            (l) => l.source.toLowerCase().includes(search) || l.target.toLowerCase().includes(search)
          );
        }

        // 3. Density Pruning (Dynamic)
        activeLinks = activeLinks
          .sort((a, b) => b.value - a.value)
          .filter((l, i) => {
            if (i < 30) return true; // Keep backbone
            return l.value >= densityThreshold;
          });

        if (activeLinks.length > 500) activeLinks = activeLinks.slice(0, 500);

        const maxVal = d3.max(activeLinks, (l) => l.value) || 1;

        // 4. Build Node Set from active links ONLY
        const activeNodeIds = new Set();
        activeLinks.forEach((l) => { activeNodeIds.add(l.source); activeNodeIds.add(l.target); });
        
        const nodes = Array.from(activeNodeIds).map((id) => ({
          id,
          name: nodeRegistry.get(id).name,
        }));

        const svgHeight = Math.max(rect.height, activeLinks.length * verticalScale + 100);
        const svgWidth = rect.width;
        svg.attr("width", svgWidth).attr("height", svgHeight);
        
        sankeyInstance.extent([[5, 5], [rect.width - 120, svgHeight - 20]]);
        
        const links = activeLinks.map((l) => ({
          source: nodes.findIndex((n) => n.id === l.source),
          target: nodes.findIndex((n) => n.id === l.target),
          value: l.value,
          srcId: l.source,
          tgtId: l.target
        })).filter((l) => l.source !== -1 && l.target !== -1);

        if (nodes.length < 2 || links.length === 0) {
          svg.selectAll("*").remove();
          return;
        }
        let graph;
        try {
          graph = sankeyInstance({
            nodes: JSON.parse(JSON.stringify(nodes)),
            links: JSON.parse(JSON.stringify(links)),
          });
        } catch (e) {
          return;
        }

        const link = svg
          .selectAll(".link")
          .data(graph.links, (d) => `${d.source.id}->${d.target.id}`);
        link.exit().remove();
        const linkEnter = link.enter().append("path").attr("class", "link");
        linkEnter
          .merge(link)
          .transition()
          .duration(250)
          .attr("d", d3.sankeyLinkHorizontal())
          .attr("stroke-width", (d) => Math.max(1, d.width))
          .attr("stroke", (d) => getColor(d.source.id))
          .attr("stroke-opacity", (d) =>
            Math.min(0.9, 0.15 + (d.value / maxVal) * 0.75),
          );
        linkEnter.on("click", (e, d) => {
          e.stopPropagation();
          currentFocus = {
            type: "link",
            src: d.source.id,
            tgt: d.target.id,
            name: d.source.name,
          };
          updateFeedUI();
          render();
        });

        const nodeG = svg.selectAll(".node").data(graph.nodes, (d) => d.id);
        nodeG.exit().remove();
        const nodeEnter = nodeG.enter().append("g").attr("class", "node");
        nodeEnter.append("rect");
        nodeEnter.append("text").attr("dy", "0.35em");
        const nodeMerge = nodeEnter
          .merge(nodeG)
          .transition()
          .duration(250)
          .attr("transform", (d) => `translate(${d.x0},${d.y0})`)
          .attr("class", (d) =>
            currentFocus &&
            currentFocus.type === "node" &&
            d.id === currentFocus.id
              ? "node selected"
              : "node",
          );
        nodeMerge
          .select("rect")
          .attr("height", (d) => Math.max(1, d.y1 - d.y0))
          .attr("width", (d) => d.x1 - d.x0)
          .attr("fill", (d) => getColor(d.id));
        nodeMerge
          .select("text")
          .attr("y", (d) => (d.y1 - d.y0) / 2)
          .text((d) => d.name)
          .attr("x", (d) => 12 + (d.x1 - d.x0))
          .attr("text-anchor", "start")
          .style("opacity", (d) => (d.y1 - d.y0 > 8 ? 0.9 : 0));
        nodeEnter
          .on("mouseover", (e, d) => {
            tooltip.style.opacity = 1;
            tooltip.innerHTML = d.name;
            tooltip.style.left = e.clientX + 10 + "px";
            tooltip.style.top = e.clientY - 30 + "px";
          })
          .on("mouseout", () => (tooltip.style.opacity = 0))
          .on("click", (e, d) => {
            e.stopPropagation();
            currentFocus = { type: "node", id: d.id, name: d.name };
            document.getElementById("focus-label").innerText =
              d.name.toUpperCase();
            updateFeedUI();
            render();
          });
      }

      function processLog(log) {
        logsBuffer.push(log);
        if (logsBuffer.length > 500) logsBuffer.shift();
        const search = document.getElementById("searchInput").value.toLowerCase();
        if (search && !JSON.stringify(log).toLowerCase().includes(search))
          return;

        // Extraction Guarantee: Platform -> Priority/Tag (Global Merge) -> Message Tree
        const segments = log.segments || [];
        if (segments.length < 2) return;

        let pathIds = [];
        for (let j = 0; j < segments.length; j++) {
          pathIds.push(`L${j}_${segments[j]}`);
        }

        for (let i = 0; i < segments.length - 1; i++) {
          const sId = pathIds[i];
          const tId = pathIds[i + 1];
          if (!nodeRegistry.has(sId))
            nodeRegistry.set(sId, { name: segments[i] });
          if (!nodeRegistry.has(tId))
            nodeRegistry.set(tId, { name: segments[i + 1] });
          const linkId = `${sId}->${tId}`;
          if (!linkRegistry.has(linkId))
            linkRegistry.set(linkId, { source: sId, target: tId, value: 0 });
          linkRegistry.get(linkId).value++;
        }
        if (matchesFocus(log, currentFocus)) addLogToSidebar(log);
      }

      function matchesFocus(log, focus) {
        if (!focus) return true;
        return JSON.stringify(log)
          .toLowerCase()
          .includes(focus.name.toLowerCase());
      }
      function updateFeedUI() {
        logFeed.innerHTML = "";
        logsBuffer
          .slice(-50)
          .filter((l) => matchesFocus(l, currentFocus))
          .forEach(addLogToSidebar);
      }
      function addLogToSidebar(log) {
        const div = document.createElement("div");
        div.className = "log-item";
        div.innerHTML = `<span style="color:var(--primary); font-weight:950;">${log.levelTag || "L"}</span>: ${log.msg || "..."}`;
        logFeed.prepend(div);
        if (logFeed.childNodes.length > 50) logFeed.lastChild.remove();
      }
      setInterval(() => {
        if (!isPaused) render();
      }, 1200);
      document.getElementById("densitySlider").oninput = render;
      document.getElementById("depthSlider").oninput = render;
      document.getElementById("searchInput").oninput = render;

      document.getElementById("pauseBtn").onclick = function () {
        isPaused = !isPaused;
        this.innerText = isPaused ? "Resume" : "Pause";
        this.className = isPaused ? "primary-btn" : "secondary-btn";
      };

      document.getElementById("clearBtn").onclick = () => {
        logFeed.innerHTML = "";
        logsBuffer = [];
      };

      document.getElementById("resetBtn").onclick = () => {
        nodeRegistry.clear();
        linkRegistry.clear();
        logsBuffer = [];
        currentFocus = null;
        updateFeedUI();
        render();
      };
      container.onclick = () => {
        currentFocus = null;
        document.getElementById("focus-label").innerText = "ALL LOGS";
        updateFeedUI();
        render();
      };
      const connect = () => {
        const ws = new WebSocket(
          `${location.protocol.replace("http", "ws")}//${location.host}`,
        );
        ws.onmessage = (e) => {
          if (!isPaused) processLog(JSON.parse(e.data));
        };
        ws.onclose = () => setTimeout(connect, 3000);
      };
      connect();
    </script>
  </body>
</html>
