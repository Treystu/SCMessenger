<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>LogSankey Elite v4.0 Fuzzy</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
    <style>
      :root {
        --bg: #020617;
        --primary: #00ced1;
        --accent: #a855f7;
        --text: #f1f5f9;
        --glass: rgba(15, 23, 42, 0.98);
        --glass-border: rgba(255, 255, 255, 0.1);
        --header-h: 70px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      header {
        height: var(--header-h);
        padding: 0 30px;
        background: var(--glass);
        backdrop-filter: blur(40px);
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 1000;
        flex-shrink: 0;
      }
      #main-layout {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 480px;
        width: 100%;
        min-height: 0;
      }
      #viz-container {
        position: relative;
        background: rgba(0, 0, 0, 0.5);
        height: 100%;
        width: 100%;
        overflow: auto;
      }
      #sidebar {
        background: var(--glass);
        backdrop-filter: blur(30px);
        border-left: 1px solid var(--glass-border);
        display: flex;
        flex-direction: column;
        padding: 24px;
        height: 100%;
        overflow: hidden;
      }
      #sankey-svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      #tooltip {
        position: fixed;
        padding: 8px 16px;
        background: var(--primary);
        border-radius: 6px;
        color: #000;
        font-size: 13px;
        font-weight: 1000;
        pointer-events: none;
        opacity: 0;
        z-index: 2000;
        box-shadow: 0 5px 25px rgba(0, 206, 209, 0.5);
        text-transform: uppercase;
      }

      .node rect {
        fill-opacity: 1 !important;
        rx: 4;
        cursor: pointer;
        transition: all 0.25s;
        filter: saturate(1.8);
      }
      .node:hover rect {
        filter: brightness(1.5) saturate(2);
        transform: scaleX(1.15);
      }
      .node.selected rect {
        stroke: #fff;
        stroke-width: 4px;
        filter: brightness(1.8) saturate(2);
      }
      .link {
        fill: none;
        cursor: pointer;
        transition: stroke-opacity 0.25s;
        stroke-opacity: 0.18;
      }
      .link:hover {
        stroke-opacity: 0.95 !important;
      }
      .node text {
        font-size: 8px;
        fill: rgba(255, 255, 255, 0.7);
        pointer-events: none;
        text-shadow: 0 1px 3px #000;
        font-weight: 950;
      }
      #log-feed {
        flex: 1;
        overflow-y: auto;
        padding-right: 12px;
      }
      .log-item {
        padding: 8px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.02);
        margin-bottom: 8px;
        font-size: 9px;
        line-height: 1.5;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .btn {
        padding: 10px 20px;
        border-radius: 12px;
        font-weight: 800;
        font-size: 11px;
        border: none;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn-stop {
        background: #ef4444;
        color: white;
      }
      .btn-resume {
        background: #10b981;
        color: white;
      }
      .btn-reset {
        background: rgba(255, 255, 255, 0.1);
        color: #94a3b8;
        margin-left: 10px;
      }
    </style>
  </head>
  <body>
    <div id="tooltip"></div>
    <header>
      <div style="display: flex; align-items: center; gap: 12px">
        <div
          style="
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px;
            display: grid;
            place-items: center;
            font-weight: 950;
            color: #000;
            font-size: 18px;
          "
        >
          LS
        </div>
        <div>
          <h1 style="margin: 0; font-size: 1.1rem; font-weight: 900">
            LogSankey
            <span style="font-weight: 200; opacity: 0.6"
              >v5.0 Dynamic Analysis</span
            >
          </h1>
        </div>
      </div>
      <div style="display: flex; align-items: center">
        <input
          type="text"
          id="global-search"
          style="
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            width: 350px;
            margin-right: 20px;
            outline: none;
          "
          placeholder="Global semantic search..."
        />
        <button id="pause-btn" class="btn btn-stop">🛑 Stop</button>
        <button id="reset-btn" class="btn btn-reset">Clear</button>
      </div>
    </header>

    <div id="main-layout">
      <div id="viz-container">
        <svg id="sankey-svg"></svg>
      </div>
      <div id="sidebar">
        <div
          style="
            font-size: 11px;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 15px;
            font-weight: 900;
            display: flex;
            justify-content: space-between;
          "
        >
          <span>Variant Feed</span
          ><span id="focus-label" style="color: var(--primary)">ALL LOGS</span>
        </div>
        <div id="log-feed"></div>
      </div>
    </div>

    <script>
      const svg = d3.select("#sankey-svg"),
        container = document.getElementById("viz-container"),
        logFeed = document.getElementById("log-feed"),
        tooltip = document.getElementById("tooltip");
      let nodeRegistry = new Map(),
        linkRegistry = new Map(),
        logsBuffer = [],
        isPaused = false,
        currentFocus = null;
      const sankeyInstance = d3
        .sankey()
        .nodeWidth(3)
        .nodePadding(4)
        .nodeAlign(d3.sankeyJustify);
      const colors = {
        Error: "#f87171",
        Warning: "#fbbf24",
        Info: "#4ade80",
        Debug: "#22d3ee",
        Android: "#3de1ad",
        iOS: "#3b82f6",
        System: "#a855f7",
      };

      function getColor(id) {
        for (let k in colors) if (id.includes(k)) return colors[k];
        return d3.interpolateWarm((id.length % 20) / 20);
      }

      function render() {
        const rect = container.getBoundingClientRect();
        if (rect.width < 100 || rect.height < 100) return;

        let activeLinks = Array.from(linkRegistry.values());
        const search = document
          .getElementById("global-search")
          .value.toLowerCase();

        if (currentFocus) {
          if (currentFocus.type === "node")
            activeLinks = activeLinks.filter(
              (l) =>
                l.source.includes(currentFocus.id) ||
                l.target.includes(currentFocus.id),
            );
          else
            activeLinks = activeLinks.filter(
              (l) =>
                l.source === currentFocus.src && l.target === currentFocus.tgt,
            );
        } else if (search) {
          activeLinks = activeLinks.filter(
            (l) =>
              l.source.toLowerCase().includes(search) ||
              l.target.toLowerCase().includes(search),
          );
        }

        const maxVal = d3.max(activeLinks, (l) => l.value) || 1;
        // Precision pruning (Variant Heatmap)
        if (activeLinks.length > 350 && !search && !currentFocus) {
          activeLinks = activeLinks
            .sort((a, b) => b.value - a.value)
            .slice(0, 350);
        }

        const nodeSet = new Set();
        activeLinks.forEach((l) => {
          nodeSet.add(l.source);
          nodeSet.add(l.target);
        });
        const nodes = Array.from(nodeSet).map((id) => ({
          id,
          name: nodeRegistry.get(id).name,
        }));

        // Dynamic Scaling to Prevent Node Squish
        // High-density vertical tightening (3.2px per node) and reduced margins to maximize screen utility
        const svgHeight = Math.max(
          rect.height,
          Math.min(nodes.length * 3.2 + 40, 2500),
        );
        const svgWidth = rect.width;

        svg.attr("width", svgWidth).attr("height", svgHeight);
        sankeyInstance.extent([
          [20, 20],
          [svgWidth - 350, Math.max(svgHeight - 20, 20)],
        ]);
        const links = activeLinks
          .map((l) => ({
            source: nodes.findIndex((n) => n.id === l.source),
            target: nodes.findIndex((n) => n.id === l.target),
            value: l.value,
          }))
          .filter((l) => l.source !== -1 && l.target !== -1);

        if (nodes.length < 2 || links.length === 0) {
          svg.selectAll("*").remove();
          return;
        }
        let graph;
        try {
          graph = sankeyInstance({
            nodes: JSON.parse(JSON.stringify(nodes)),
            links: JSON.parse(JSON.stringify(links)),
          });
        } catch (e) {
          return;
        }

        const link = svg
          .selectAll(".link")
          .data(graph.links, (d) => `${d.source.id}->${d.target.id}`);
        link.exit().remove();
        const linkEnter = link.enter().append("path").attr("class", "link");
        linkEnter
          .merge(link)
          .transition()
          .duration(250)
          .attr("d", d3.sankeyLinkHorizontal())
          .attr("stroke-width", (d) => Math.max(1, d.width))
          .attr("stroke", (d) => getColor(d.source.id))
          .attr("stroke-opacity", (d) =>
            Math.min(0.9, 0.15 + (d.value / maxVal) * 0.75),
          );
        linkEnter.on("click", (e, d) => {
          e.stopPropagation();
          currentFocus = {
            type: "link",
            src: d.source.id,
            tgt: d.target.id,
            name: d.source.name,
          };
          updateFeedUI();
          render();
        });

        const nodeG = svg.selectAll(".node").data(graph.nodes, (d) => d.id);
        nodeG.exit().remove();
        const nodeEnter = nodeG.enter().append("g").attr("class", "node");
        nodeEnter.append("rect");
        nodeEnter.append("text").attr("dy", "0.35em");
        const nodeMerge = nodeEnter
          .merge(nodeG)
          .transition()
          .duration(250)
          .attr("transform", (d) => `translate(${d.x0},${d.y0})`)
          .attr("class", (d) =>
            currentFocus &&
            currentFocus.type === "node" &&
            d.id === currentFocus.id
              ? "node selected"
              : "node",
          );
        nodeMerge
          .select("rect")
          .attr("height", (d) => Math.max(1, d.y1 - d.y0))
          .attr("width", (d) => d.x1 - d.x0)
          .attr("fill", (d) => getColor(d.id));
        nodeMerge
          .select("text")
          .attr("y", (d) => (d.y1 - d.y0) / 2)
          .text((d) => d.name)
          .attr("x", (d) => 12 + (d.x1 - d.x0))
          .attr("text-anchor", "start")
          .style("opacity", (d) => (d.y1 - d.y0 > 8 ? 0.9 : 0));
        nodeEnter
          .on("mouseover", (e, d) => {
            tooltip.style.opacity = 1;
            tooltip.innerHTML = d.name;
            tooltip.style.left = e.clientX + 10 + "px";
            tooltip.style.top = e.clientY - 30 + "px";
          })
          .on("mouseout", () => (tooltip.style.opacity = 0))
          .on("click", (e, d) => {
            e.stopPropagation();
            currentFocus = { type: "node", id: d.id, name: d.name };
            document.getElementById("focus-label").innerText =
              d.name.toUpperCase();
            updateFeedUI();
            render();
          });
      }

      function processLog(log) {
        logsBuffer.push(log);
        if (logsBuffer.length > 500) logsBuffer.shift();
        const search = document
          .getElementById("global-search")
          .value.toLowerCase();
        if (search && !JSON.stringify(log).toLowerCase().includes(search))
          return;

        // Extraction Guarantee: Platform -> Priority/Tag (Global Merge) -> Message Tree
        const segments = log.segments || [];
        if (segments.length < 2) return;

        let pathIds = [];
        for (let j = 0; j < segments.length; j++) {
          pathIds.push(`L${j}_${segments[j]}`);
        }

        for (let i = 0; i < segments.length - 1; i++) {
          const sId = pathIds[i];
          const tId = pathIds[i + 1];
          if (!nodeRegistry.has(sId))
            nodeRegistry.set(sId, { name: segments[i] });
          if (!nodeRegistry.has(tId))
            nodeRegistry.set(tId, { name: segments[i + 1] });
          const linkId = `${sId}->${tId}`;
          if (!linkRegistry.has(linkId))
            linkRegistry.set(linkId, { source: sId, target: tId, value: 0 });
          linkRegistry.get(linkId).value++;
        }
        if (matchesFocus(log, currentFocus)) addLogToSidebar(log);
      }

      function matchesFocus(log, focus) {
        if (!focus) return true;
        return JSON.stringify(log)
          .toLowerCase()
          .includes(focus.name.toLowerCase());
      }
      function updateFeedUI() {
        logFeed.innerHTML = "";
        logsBuffer
          .slice(-50)
          .filter((l) => matchesFocus(l, currentFocus))
          .forEach(addLogToSidebar);
      }
      function addLogToSidebar(log) {
        const div = document.createElement("div");
        div.className = "log-item";
        div.innerHTML = `<span style="color:var(--primary); font-weight:950;">${log.levelTag || "L"}</span>: ${log.msg || "..."}`;
        logFeed.prepend(div);
        if (logFeed.childNodes.length > 50) logFeed.lastChild.remove();
      }
      setInterval(() => {
        if (!isPaused) render();
      }, 1200);
      document.getElementById("pause-btn").onclick = function () {
        isPaused = !isPaused;
        this.innerText = isPaused ? "▶️ Resume" : "🛑 Stop";
        this.className = isPaused ? "btn btn-resume" : "btn btn-stop";
      };
      document.getElementById("reset-btn").onclick = () => {
        nodeRegistry.clear();
        linkRegistry.clear();
        logsBuffer = [];
        currentFocus = null;
        updateFeedUI();
        render();
      };
      container.onclick = () => {
        currentFocus = null;
        document.getElementById("focus-label").innerText = "ALL LOGS";
        updateFeedUI();
        render();
      };
      const connect = () => {
        const ws = new WebSocket(
          `${location.protocol.replace("http", "ws")}//${location.host}`,
        );
        ws.onmessage = (e) => {
          if (!isPaused) processLog(JSON.parse(e.data));
        };
        ws.onclose = () => setTimeout(connect, 3000);
      };
      connect();
    </script>
  </body>
</html>
