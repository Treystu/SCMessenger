Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref FarmSimVPC

  SubnetAId:
    Value: !Ref SubnetA
  SubnetBId:
    Value: !Ref SubnetB
  SubnetCId:
    Value: !Ref SubnetC

  Relay1PublicIP:
    Value: !GetAtt RelayNode1.PublicIp
  Relay1PrivateIP:
    Value: !GetAtt RelayNode1.PrivateIp
  Relay2PublicIP:
    Value: !GetAtt RelayNode2.PublicIp
  Relay2PrivateIP:
    Value: !GetAtt RelayNode2.PrivateIp
  AlicePublicIP:
    Value: !GetAtt UserNodeAlice.PublicIp
  BobPublicIP:
    Value: !GetAtt UserNodeBob.PublicIp
  CarolPublicIP:
    Value: !GetAtt UserNodeCarol.PublicIp
  DavidPublicIP:
    Value: !GetAtt UserNodeDavid.PublicIp
  EvePublicIP:
    Value: !GetAtt UserNodeEve.PublicIp

  AllInstanceIPs:
    Description: relay1,relay2,alice,bob,carol,david,eve public IPs (CSV, same order)
    Value: !Join
      - ','
      - - !GetAtt RelayNode1.PublicIp
        - !GetAtt RelayNode2.PublicIp
        - !GetAtt UserNodeAlice.PublicIp
        - !GetAtt UserNodeBob.PublicIp
        - !GetAtt UserNodeCarol.PublicIp
        - !GetAtt UserNodeDavid.PublicIp
        - !GetAtt UserNodeEve.PublicIp
