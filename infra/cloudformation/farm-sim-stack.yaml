AWSTemplateFormatVersion: '2010-09-09'
Description: 'Farm-Sim 7-Node Micro-Instance Topology for SCMessenger Testing (one container per EC2 instance)'

Parameters:
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: scmessenger-farm-sim-key
    Description: EC2 Key Pair for SSH access

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
    Description: Instance type (free-tier-eligible size only)

  GitRepoUrl:
    Type: String
    Default: https://github.com/Sovereign-Communication/SCMessenger.git
    Description: Public repo URL each instance clones on boot

  GitRef:
    Type: String
    Default: main
    Description: Branch/tag/commit to check out on each instance

Resources:
  # ----------------------------------------------------------------------
  # Networking
  # ----------------------------------------------------------------------
  FarmSimVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: scmessenger-farm-sim-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: scmessenger-farm-sim-igw

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref FarmSimVPC
      InternetGatewayId: !Ref InternetGateway

  SubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref FarmSimVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: scmessenger-subnet-a

  SubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref FarmSimVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: scmessenger-subnet-b

  SubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref FarmSimVPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: scmessenger-subnet-c

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref FarmSimVPC
      Tags:
        - Key: Name
          Value: scmessenger-farm-sim-rt

  Route:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SubnetA
      RouteTableId: !Ref RouteTable

  SubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SubnetB
      RouteTableId: !Ref RouteTable

  SubnetCRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SubnetC
      RouteTableId: !Ref RouteTable

  # ----------------------------------------------------------------------
  # Security Group
  # NOTE: intra-VPC rule is deliberately broad (-1 all protocols) because
  # Phase 3 failure-injection tests use `tc netem` on the *instances*
  # themselves (not the SG) to simulate latency/loss/partition. Locking
  # the SG down further would just make those tests fight the firewall
  # instead of the thing we're actually trying to test.
  # ----------------------------------------------------------------------
  FarmSimSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for farm-sim nodes
      VpcId: !Ref FarmSimVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH from anywhere (testing convenience)
        - IpProtocol: -1
          CidrIp: 10.0.0.0/16
          Description: All protocols between farm-sim nodes (P2P + health checks)
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: scmessenger-farm-sim-sg

  # ----------------------------------------------------------------------
  # EC2 Instances — one container per instance, built independently.
  #
  # Each instance is self-contained: adds swap (t3.micro has only 1GiB RAM
  # and `cargo build --release` on this workspace's dependency graph
  # — libp2p, tokio, rustls, etc. — can exceed that during linking),
  # builds its own image from source, then runs a single container with
  # --network host (so libp2p binds directly to the instance's real
  # interface instead of fighting Docker NAT — matches the "IP is the
  # source of truth" ledger design in cli/src/ledger.rs).
  #
  # Bootstrap wiring: relay1 is the root (no bootstrap). relay2 and the
  # four Subnet-A/B user nodes bootstrap off relay1's PRIVATE ip (cheaper/
  # faster than going out over the public IP and back in). eve bootstraps
  # off relay2, forcing a 2-hop relay path to validate multi-hop routing.
  # ----------------------------------------------------------------------

  RelayNode1:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id}}'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref SubnetA
      SecurityGroupIds:
        - !Ref FarmSimSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 16
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -ex
          exec > /var/log/user-data.log 2>&1

          # Swap: t3.micro has 1GiB RAM; cargo build --release on this
          # workspace can exceed that during linking. Without swap the
          # OOM killer takes rustc/the linker and the build silently dies.
          fallocate -l 2G /swapfile
          chmod 600 /swapfile
          mkswap /swapfile
          swapon /swapfile
          echo '/swapfile none swap sw 0 0' >> /etc/fstab

          apt-get update
          apt-get install -y docker.io git curl jq
          systemctl start docker
          systemctl enable docker

          cd /opt
          git clone --depth 1 --branch ${GitRef} ${GitRepoUrl} SCMessenger
          cd SCMessenger

          docker build -t scmessenger:latest -f docker/Dockerfile .
          docker builder prune -af || true

          docker run -d \
            --name scm-node \
            --network host \
            --restart unless-stopped \
            -e RUST_LOG=info,scmessenger=debug \
            -e NODE_NAME=relay1 \
            -e LISTEN_PORT=4001 \
            -e SC_BOOTSTRAP_NODES= \
            scmessenger:latest
      Tags:
        - Key: Name
          Value: scm-relay1
        - Key: Node
          Value: relay1

  RelayNode2:
    Type: AWS::EC2::Instance
    DependsOn: RelayNode1
    Properties:
      ImageId: '{{resolve:ssm:/aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id}}'
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SubnetId: !Ref SubnetB
      SecurityGroupIds:
        - !Ref FarmSimSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 16
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -ex
          exec > /var/log/user-data.log 2>&1

          fallocate -l 2G /swapfile
          chmod 600 /swapfile
          mkswap /swapfile
          swapon /swapfile
          echo '/swapfile none swap sw 0 0' >> /etc/fstab

          apt-get update
          apt-get install -y docker.io git curl jq
          systemctl start docker
          systemctl enable docker

          cd /opt
          git clone --depth 1 --branch ${GitRef} ${GitRepoUrl} SCMessenger
          cd SCMessenger

          docker build -t scmessenger:latest -f docker/Dockerfile .
          docker builder prune -af || true

          docker run -d \
            --name scm-node \
            --network host \
            --restart unless-stopped \
            -e RUST_LOG=info,scmessenger=debug \
            -e NODE_NAME=relay2 \
            -e LISTEN_PORT=4002 \
            -e SC_BOOTSTRAP_NODES=/ip4/${RelayNode1.PrivateIp}/tcp/4001 \
            scmessenger:latest
      Tags:
        - Key: Name
          Value: scm-relay2
        - Key: Node
          Value: relay2

  UserNodeAlice:
    Type: AWS::EC2::Instance
    DependsOn: RelayNode1
