          cd SCMessenger

          docker build -t scmessenger:latest -f docker/Dockerfile .
          docker builder prune -af || true

          docker run -d \
            --name scm-node \
            --network host \
            --restart unless-stopped \
            -e RUST_LOG=info,scmessenger=debug \
            -e NODE_NAME=alice \
            -e LISTEN_PORT=0 \
            -e SC_BOOTSTRAP_NODES=/ip4/${RelayNode1.PrivateIp}/tcp/4001 \
            scmessenger:latest
      Tags:
        - Key: Name
          Value: scm-alice
        - Key: Node
          Value: alice

  UserNodeBob:
