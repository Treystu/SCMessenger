name: Multi-Platform Release Pipeline

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # CLI Builds (Linux, macOS, Windows)
  build-cli:
    name: Build CLI - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: scmessenger-cli-linux-amd64
            asset_name: scm-linux-amd64
          - target: x86_64-apple-darwin
            os: macos-14
            artifact_name: scmessenger-cli-macos-amd64
            asset_name: scm-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-14
            artifact_name: scmessenger-cli-macos-arm64
            asset_name: scm-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: scmessenger-cli-windows-amd64.exe
            asset_name: scm-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release
        run: cargo build --release --bin scmessenger-cli --target ${{ matrix.target }}

      - name: Prepare Asset (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/scmessenger-cli ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}

      - name: Prepare Asset (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/scmessenger-cli.exe ${{ matrix.asset_name }}

      - name: Generate Checksum
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            Get-FileHash -Algorithm SHA256 ${{ matrix.asset_name }} | ForEach-Object { "$($_.Hash)  $($_.Path)" } > ${{ matrix.asset_name }}.sha256
          else
            sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256

  # Android Release Build
  build-android:
    name: Build Android Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Build Debug APK (for CI verification)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

      # Signed release build: only runs once SCMESSENGER_KEYSTORE_BASE64 is
      # set as a repo secret (see docs/ANDROID_RELEASE_SIGNING.md for how to
      # generate the keystore and configure the four required secrets).
      # Uses the env-driven signing path in android/app/build.gradle
      # (SCMESSENGER_KEYSTORE_PATH/_PASSWORD/_ALIAS/_PASSWORD -- first
      # priority in its signingConfigs.release block), so nothing in the
      # gradle config itself needs to change. Produces both a .aab (for
      # Play Store upload) and a signed .apk (for direct/sideload
      # distribution, e.g. handing a build straight to an alpha tester
      # without waiting on a Play Store review).
      - name: Decode release keystore
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        env:
          HAS_KEYSTORE: ${{ secrets.SCMESSENGER_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.SCMESSENGER_KEYSTORE_BASE64 }}" | base64 -d > android/release.keystore

      - name: Build signed release AAB + APK
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        env:
          HAS_KEYSTORE: ${{ secrets.SCMESSENGER_KEYSTORE_BASE64 != '' }}
          SCMESSENGER_KEYSTORE_PATH: release.keystore
          SCMESSENGER_KEYSTORE_PASSWORD: ${{ secrets.SCMESSENGER_KEYSTORE_PASSWORD }}
          SCMESSENGER_KEY_ALIAS: ${{ secrets.SCMESSENGER_KEY_ALIAS }}
          SCMESSENGER_KEY_PASSWORD: ${{ secrets.SCMESSENGER_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease assembleRelease

      - name: Remove decoded keystore
        if: always()
        run: rm -f android/release.keystore

      - name: Upload signed release artifacts
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        env:
          HAS_KEYSTORE: ${{ secrets.SCMESSENGER_KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-release-signed
          path: |
            android/app/build/outputs/bundle/release/*.aab
            android/app/build/outputs/apk/release/*.apk

  # iOS Release Build
  build-ios:
    name: Build iOS Release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.0.app

      - name: Install CocoaPods
        run: gem install cocoaPods

      - name: Install Pods
        run: |
          cd iOS
          pod install

      - name: Build Workspace
        run: |
          cd iOS
          xcodebuild -workspace SCMessenger.xcworkspace \
            -scheme SCMessenger \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            build

      - name: Run Tests
        run: |
          cd iOS
          xcodebuild test \
            -workspace SCMessenger.xcworkspace \
            -scheme SCMessenger \
            -destination 'platform=iOS Simulator,name=iPhone 15'

      # Note: Release signing requires GitHub Secrets
      # Uncomment and configure secrets for production releases
      # - name: Import Certificates
      #   env:
      #     CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
      #     CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      #     PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      #   run: |
      #     # Import certificate to keychain
      #     echo "$CERTIFICATE_BASE64" | base64 -d > certificate.p12
      #     security create-keychain -p "" build.keychain
      #     security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
      #     security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
      #     # Install provisioning profile
      #     echo "$PROVISIONING_PROFILE_BASE64" | base64 -d > profile.mobileprovision
      #     mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
      #     cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      # 
      # - name: Build IPA
      #   run: |
      #     cd iOS
      #     xcodebuild -workspace SCMessenger.xcworkspace \
      #       -scheme SCMessenger \
      #       -configuration Release \
      #       -archivePath build/SCMessenger.xcarchive \
      #       archive
      #     xcodebuild -exportArchive \
      #       -archivePath build/SCMessenger.xcarchive \
      #       -exportPath build \
      #       -exportOptionsPlist ExportOptions.plist

  # WASM Release Build
  build-wasm:
    name: Build WASM Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install wasm-opt
        run: |
          wget https://github.com/WebAssembly/binaryen/releases/download/version_116/binaryen-version_116-x86_64-linux.tar.gz
          tar -xzf binaryen-version_116-x86_64-linux.tar.gz
          sudo cp binaryen-version_116/bin/wasm-opt /usr/local/bin/

      - name: Build WASM
        run: |
          cd wasm
          wasm-pack build --target web --release

      - name: Optimize WASM
        run: |
          cd wasm
          wasm-opt -Oz pkg/scmessenger_wasm_bg.wasm -o pkg/scmessenger_wasm_bg.wasm
          echo "Original size: $(stat -c%s pkg/scmessenger_wasm_bg.wasm.orig) bytes"
          echo "Optimized size: $(stat -c%s pkg/scmessenger_wasm_bg.wasm) bytes"

      - name: Generate ES Module and UMD formats
        run: |
          cd wasm
          # Create UMD bundle
          cat > pkg/scmessenger_wasm.umd.js << 'EOF'
          (function (global, factory) {
            if (typeof define === "function" && define.amd) {
              define(["exports"], factory);
            } else if (typeof exports !== "undefined") {
              factory(exports);
            } else {
              var mod = { exports: {} };
              factory(mod.exports);
              global.scmessenger_wasm = mod.exports;
            }
          })(typeof globalThis !== "undefined" ? globalThis : typeof self !== "undefined" ? self : this, function (exports) {
            "use strict";
            // ES module content will be inserted here
            const esModule = require('./scmessenger_wasm.js');
            Object.keys(esModule).forEach(key => {
              exports[key] = esModule[key];
            });
          });
          EOF

      - name: Upload WASM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-release
          path: wasm/pkg/*

  # Create GitHub Release
  create-release:
    name: Create GitHub Release
    needs: [build-cli, build-android, build-ios, build-wasm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      - name: Generate Changelog
        run: |
          ./scripts/generate_changelog.sh
          cat CHANGELOG.md

      - name: Generate Combined Checksums
        run: |
          # Find all binary files (excluding checksums)
          find . -type f \( -name "scm-*" -o -name "*.apk" -o -name "*.aab" -o -name "*.ipa" -o -name "*.wasm" \) ! -name "*.sha256" | while read file; do
            if [ -f "$file" ]; then
              sha256sum "$file" >> SHA256SUMS.txt
            fi
          done
          echo "Generated checksums:"
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/scm-*
            **/*.apk
            **/*.aab
            **/*.ipa
            **/*.wasm
            **/*.js
            **/*.ts
            SHA256SUMS.txt
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
