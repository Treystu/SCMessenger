name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-features -- -D warnings
      - run: cargo install cargo-deny
      - run: cargo deny check

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install libdbus-1-dev (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      # Only Windows runners lack a preinstalled/vendored protoc; matches the
      # manual cross-platform-test.yml dispatch workflow's test-windows job.
      - name: Install protoc (Windows)
        if: matrix.os == 'windows-latest'
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo test --workspace --all-features

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - run: cargo doc --workspace --no-deps

  ffi-surface:
    name: FFI Surface Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      # gen_kotlin/gen_swift locate the compiled cdylib by filesystem path at
      # runtime rather than through a Cargo dependency edge, so `cargo run`
      # alone doesn't guarantee it's been built (verified: deleting the
      # cdylib and re-running `cargo run --bin gen_kotlin` reproduces the
      # "cdylib not found" panic even though nothing else changed).
      - run: cargo build -p scmessenger-core --features gen-bindings
      - run: cargo run -p scmessenger-core --bin gen_kotlin --features gen-bindings
      - run: cargo run -p scmessenger-core --bin gen_swift --features gen-bindings
      - run: scripts/ffi_surface.sh
