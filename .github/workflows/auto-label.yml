name: Auto Label

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Label by changed files
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            const labels = new Set();
            
            for (const file of files) {
              const filename = file.filename;
              
              // Platform labels
              if (filename.startsWith('core/') || filename.startsWith('mobile/')) {
                labels.add('rust');
              }
              if (filename.startsWith('android/')) {
                labels.add('android');
              }
              if (filename.startsWith('iOS/')) {
                labels.add('ios');
              }
              if (filename.startsWith('wasm/')) {
                labels.add('wasm');
              }
              if (filename.startsWith('cli/')) {
                labels.add('cli');
              }
              
              // Documentation
              if (filename.startsWith('docs/') || filename.endsWith('.md')) {
                labels.add('docs');
              }
              
              // CI/CD
              if (filename.startsWith('.github/workflows/') || filename.startsWith('.github/actions/')) {
                labels.add('ci');
              }
              
              // Tests
              if (filename.includes('test') || filename.includes('tests/')) {
                labels.add('tests');
              }
            }
            
            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: Array.from(labels)
              });
            }
