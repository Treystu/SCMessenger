name: Mobile

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  android:
    name: Android Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          key: android-build
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27
      - name: Build native library
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: cargo ndk -t arm64-v8a build -p scmessenger-core --release
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build Android APK
        working-directory: android
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: ./gradlew :app:assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/

  ios:
    name: iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim
      - uses: Swatinem/rust-cache@v2
        with:
          key: ios-build
      - name: Build for iOS
        run: cargo build --target aarch64-apple-ios -p scmessenger-core --release
      - name: Build for iOS Simulator
        run: cargo build --target aarch64-apple-ios-sim -p scmessenger-core --release
      - name: Build Xcode project
        run: |
          xcodebuild -project ios/SCMessenger/SCMessenger.xcodeproj \
            -scheme SCMessenger \
            -destination 'generic/platform=iOS Simulator' \
            build CODE_SIGNING_ALLOWED=NO
