# ==============================================================================
# SCMessenger iOS Build & Test Workflow
# ==============================================================================
#
# Dispatchable workflow that builds the Rust core for iOS targets, generates
# the XCFramework, and runs the iOS test suite on a simulator. Results are
# reported back to the orchestrator via callback URL.
#
# Triggers: Manual dispatch with sprint_id and git_branch inputs
#           Plus push and pull_request on iOS/**, core/src/api.udl, and mobile/**
#
# Jobs:
#   build-ios:       Cross-compile Rust → iOS, build XCFramework, run XCTest
#   test-macos-native: Native macOS cargo test + CLI build verification
#
# ==============================================================================

name: iOS Build & Test

on:
  workflow_dispatch:
    inputs:
      sprint_id:
        description: "Sprint identifier for tracking (e.g., sprint-42)"
        required: true
        type: string
      git_branch:
        description: "Branch to build and test"
        required: true
        default: main
        type: string
  pull_request:
    paths:
      - 'iOS/**'
      - 'core/src/api.udl'
      - 'mobile/**'
  push:
    paths:
      - 'iOS/**'
      - 'core/src/api.udl'
      - 'mobile/**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Job 1: iOS Build & Test (Apple Silicon)
  # ============================================================================
  build-ios:
    name: iOS Build & Simulator Test
    runs-on: macos-14  # Apple Silicon M1 runner
    timeout-minutes: 30

    steps:
      # --- Checkout ---
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git_branch || github.ref }}

      # --- Rust Toolchain ---
      - name: Install Rust toolchain with iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ios-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ios-

      # --- Build Rust Core for iOS ---
      - name: Build Rust core for iOS device (aarch64-apple-ios)
        run: cargo build --release --target aarch64-apple-ios -p scmessenger-core

      - name: Build Rust core for iOS Simulator (aarch64-apple-ios-sim)
        run: cargo build --release --target aarch64-apple-ios-sim -p scmessenger-core

      # --- Host Native Build for Bindings Generation ---
      - name: Build host native library for bindings generation
        run: cargo build -p scmessenger-core

      # --- Swift Bindings Drift Check ---
      - name: Verify Swift bindings are up to date
        # Known bindings drift until PQC-10 regen; non-blocking until then (see TASK_CI_IOS_MACOS_RUNNER_FIX.md)
        continue-on-error: true
        run: |
          ./scripts/verify_ios_bindings.sh

      # --- XCFramework ---
      - name: Build XCFramework
        run: |
          chmod +x scripts/build_xcframework.sh
          scripts/build_xcframework.sh

      - name: Verify XCFramework exists
        run: |
          if [ ! -d "iOS/SCMessengerCore.xcframework" ]; then
            echo "ERROR: XCFramework not found at iOS/SCMessengerCore.xcframework"
            ls -la iOS/
            exit 1
          fi
          echo "XCFramework generated successfully:"
          ls -la iOS/SCMessengerCore.xcframework/

      # --- iOS Simulator Test ---
      - name: Build for testing (iOS Simulator)
        working-directory: iOS
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project SCMessenger/SCMessenger.xcodeproj \
            -scheme SCMessenger \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | (xcpretty 2>/dev/null || cat)

      - name: Run iOS tests
        working-directory: iOS
        run: |
          # NOTE: CoreBluetooth, Multipeer/AWDL, APNs, and background modes are hardware-waived and not covered by simulator
          set -o pipefail
          xcodebuild test \
            -project SCMessenger/SCMessenger.xcodeproj \
            -scheme SCMessenger \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -configuration Debug \
            -resultBundlePath ../test-results/ios-test-results.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | (xcpretty 2>/dev/null || cat)

      # --- Artifacts ---
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results-${{ github.event.inputs.sprint_id }}
          path: test-results/
          retention-days: 30

      # --- Orchestrator Callback ---
      - name: Notify orchestrator
        if: always()
        env:
          ORCHESTRATOR_URL: ${{ secrets.ORCHESTRATOR_URL }}
        run: |
          # Determine job status
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="passed"
          else
            STATUS="failed"
          fi

          # Send results to orchestrator
          curl -sf -X POST "${ORCHESTRATOR_URL}/api/v1/build-results" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.ORCHESTRATOR_TOKEN }}" \
            -d "{
              \"sprint_id\": \"${{ github.event.inputs.sprint_id }}\",
              \"workflow\": \"ios-build-test\",
              \"job\": \"build-ios\",
              \"status\": \"${STATUS}\",
              \"platform\": \"ios\",
              \"branch\": \"${{ github.event.inputs.git_branch }}\",
              \"run_id\": \"${{ github.run_id }}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"timestamp\": \"$(date -u '+%Y-%m-%dT%H:%M:%SZ')\"
            }" || echo "WARNING: Failed to notify orchestrator (non-fatal)"

  # ============================================================================
  # Job 2: Native macOS Test & CLI Build
  # ============================================================================
  test-macos-native:
    name: macOS Native Tests
    runs-on: macos-14  # Apple Silicon M1 runner
    # `cargo test --workspace` compiles the complete Rust workspace before the
    # release CLI build below. A cold macOS runner can exceed 15 minutes before
    # tests even begin, so keep the native gate bounded but give it enough time
    # to run its intended verification.
    timeout-minutes: 45

    steps:
      # --- Checkout ---
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git_branch || github.ref }}

      # --- Rust Toolchain ---
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-native-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-native-

      # --- Test ---
      - name: Run workspace tests
        run: cargo test --workspace

      # --- CLI Build ---
      - name: Build CLI (release)
        run: cargo build --release -p scmessenger-cli

      - name: Verify CLI binary
        run: |
          ls -la target/release/scmessenger-cli
          file target/release/scmessenger-cli
