name: Cross

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  NDK_VERSION: r27

jobs:
  android:
    name: Android (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            target: aarch64-linux-android
          - abi: armeabi-v7a
            target: armv7-linux-androideabi
          - abi: x86_64
            target: x86_64-linux-android
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: android-${{ matrix.abi }}
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
      - name: Build for ${{ matrix.abi }}
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: cargo ndk -t ${{ matrix.abi }} build -p scmessenger-core --release
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}
          path: target/${{ matrix.target }}/release/libscmessenger_core.a

  ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim
      - uses: Swatinem/rust-cache@v2
        with:
          key: ios
      - name: Build for aarch64-apple-ios
        run: cargo build --target aarch64-apple-ios -p scmessenger-core --release
      - name: Build for aarch64-apple-ios-sim
        run: cargo build --target aarch64-apple-ios-sim -p scmessenger-core --release
      - name: Upload aarch64-apple-ios
        uses: actions/upload-artifact@v4
        with:
          name: ios-aarch64
          path: target/aarch64-apple-ios/release/libscmessenger_core.a
      - name: Upload aarch64-apple-ios-sim
        uses: actions/upload-artifact@v4
        with:
          name: ios-aarch64-sim
          path: target/aarch64-apple-ios-sim/release/libscmessenger_core.a

  wasm:
    name: WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm
      - name: Build for wasm32-unknown-unknown
        run: cargo build --target wasm32-unknown-unknown -p scmessenger-wasm --release
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: target/wasm32-unknown-unknown/release/

  bindings-kotlin:
    name: Bindings (Kotlin)
    runs-on: ubuntu-latest
    needs: android
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: bindings-kotlin
      - name: Download Android arm64 cdylib
        uses: actions/download-artifact@v4
        with:
          name: android-arm64-v8a
          path: target/aarch64-linux-android/release/
      - name: Generate Kotlin bindings
        env:
          SCMESSENGER_CDYLIB_PATH: target/aarch64-linux-android/release/libscmessenger_core.a
        run: cargo run --bin gen_kotlin --features gen-bindings
      - name: Upload Kotlin bindings
        uses: actions/upload-artifact@v4
        with:
          name: bindings-kotlin
          path: core/target/generated-sources/uniffi/kotlin/

  bindings-swift:
    name: Bindings (Swift)
    runs-on: macos-latest
    needs: ios
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: bindings-swift
      - name: Download iOS arm64 cdylib
        uses: actions/download-artifact@v4
        with:
          name: ios-aarch64
          path: target/aarch64-apple-ios/release/
      - name: Generate Swift bindings
        env:
          # gen_swift patches nonisolated(unsafe) onto UniFFI converter methods
          # so the generated SCMessengerCore.swift compiles under Swift 6 strict
          # concurrency (MainActor isolation defaults).
          SCMESSENGER_CDYLIB_PATH: target/aarch64-apple-ios/release/libscmessenger_core.a
        run: cargo run --bin gen_swift --features gen-bindings
      - name: Upload Swift bindings
        uses: actions/upload-artifact@v4
        with:
          name: bindings-swift
          path: core/target/generated-sources/uniffi/swift/
