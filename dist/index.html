<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCMessenger | Headless Node</title>
    <style>
      :root {
        --bg: #0f172a;
        --text: #f8fafc;
        --primary: #00ced1;
        --accent: #9d4edd;
        --glass: rgba(30, 41, 59, 0.7);
        --border: rgba(255, 255, 255, 0.1);
      }
      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(
            circle at top right,
            rgba(157, 78, 221, 0.15),
            transparent 40%
          ),
          radial-gradient(
            circle at bottom left,
            rgba(0, 206, 209, 0.1),
            transparent 40%
          );
      }
      .container {
        background: var(--glass);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        padding: 2rem;
        border-radius: 1rem;
        text-align: center;
        max-width: 500px;
        width: 90%;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      }
      .logo {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        border-radius: 1rem;
        display: grid;
        place-items: center;
        font-weight: bold;
        font-size: 1.5rem;
        margin: 0 auto 1.5rem;
        box-shadow: 0 0 20px rgba(0, 206, 209, 0.3);
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
      }
      p {
        color: #94a3b8;
        margin: 0 0 1.5rem;
        font-size: 0.9rem;
      }
      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: rgba(0, 0, 0, 0.2);
        padding: 0.5rem 1rem;
        border-radius: 2rem;
        font-size: 0.8rem;
        border: 1px solid var(--border);
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #64748b;
      }
      .dot.active {
        background: var(--primary);
        box-shadow: 0 0 8px var(--primary);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
        100% {
          opacity: 1;
        }
      }
      #peer-id {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.7rem;
        margin-top: 1rem;
        color: #64748b;
        word-break: break-all;
      }
      #log {
        margin-top: 1.5rem;
        text-align: left;
        font-size: 0.75rem;
        max-height: 100px;
        overflow-y: auto;
        background: rgba(0, 0, 0, 0.3);
        padding: 0.75rem;
        border-radius: 0.5rem;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">SC</div>
      <h1>Headless Mesh Node</h1>
      <p>
        This browser tab is participating in the SCMessenger peer-to-peer
        network.
      </p>

      <div class="status-pill">
        <div id="status-dot" class="dot"></div>
        <span id="status-text">Initializing...</span>
      </div>

      <div id="peer-id"></div>
      <div id="log"></div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
