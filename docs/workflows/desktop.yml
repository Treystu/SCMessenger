name: Desktop (KMP linuxX64)

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-desktop-linux:
    name: Build Desktop .deb (linuxX64)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      # ---- Install Rust via rustup ----
      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          source "$HOME/.cargo/env"
          rustc --version
          cargo --version

      # ---- Cache Cargo registry ----
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ---- Cache Gradle ----
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ---- Build Rust workspace ----
      - name: Build Rust workspace
        run: cargo build --workspace

      # ---- Setup JDK 17 ----
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ---- Build .deb package via KMP ----
      - name: Build .deb package
        run: ./gradlew :shared:packageDeb --no-daemon --stacktrace

      # ---- Upload .deb artifact ----
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: scmessenger-desktop-deb
          path: |
            shared/build/compose/binaries/main/deb/*.deb
          retention-days: 30
