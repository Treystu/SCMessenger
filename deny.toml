[graph]
targets = []

[output]
feature-depth = 1

[advisories]
ignore = [
    # Transitive via sled — no safe upgrade available
    "RUSTSEC-2025-0141",
    # Transitive via sled — no safe upgrade available
    "RUSTSEC-2025-0057",
    # Transitive via libp2p -> hickory-proto 0.25.x — no fix in 0.25 series
    "RUSTSEC-2026-0118",
    # Transitive via libp2p -> hickory-proto 0.25.x — no fix in 0.25 series
    "RUSTSEC-2026-0119",
    # Transitive via sled -> parking_lot — no safe upgrade available
    "RUSTSEC-2024-0384",
    # Transitive via libp2p -> if-watch -> netlink-packet-core — no safe upgrade
    "RUSTSEC-2024-0436",
    # Transitive via tokio-tungstenite -> rustls 0.22.x -> rustls-webpki 0.102.x
    "RUSTSEC-2026-0049",
    # Same as above
    "RUSTSEC-2026-0098",
    # Same as above
    "RUSTSEC-2026-0099",
    # Same as above
    "RUSTSEC-2026-0104",
    # Transitive via proc-macro-error2 — unmaintained, transitive, no fix available
    "RUSTSEC-2026-0173",
    # Transitive via proc-macro-error — unmaintained, transitive, no fix available
    "RUSTSEC-2024-0370",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "LGPL-2.1-or-later",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "0BSD",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
allow-workspace = false
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
